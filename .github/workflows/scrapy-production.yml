name: Scrapy Proxy Production Run

on:
  workflow_dispatch:
    inputs:
      spider_names:
        description: "Comma-separated spider names. Example: bamarv,alrvsales,fraserway (leave blank to run all)"
        required: false
        default: ""
      use_proxy:
        description: "Use proxy middleware during spider run"
        required: false
        default: true
        type: boolean
      fail_fast:
        description: "If true, cancel remaining spider jobs after first failure. Example: true"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 */6 * * *"

jobs:
  discover-spiders:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build spider matrix
        id: build-matrix
        env:
          INPUT_SPIDERS: ${{ github.event.inputs.spider_names }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          selected_raw = (os.getenv("INPUT_SPIDERS") or "").strip()
          selected = [x.strip() for x in selected_raw.split(",") if x.strip()]

          proc = subprocess.run(
              [sys.executable, "-m", "scrapy", "list"],
              capture_output=True,
              text=True,
              check=False,
          )
          if proc.returncode != 0:
              print(proc.stdout)
              print(proc.stderr)
              raise SystemExit("Failed to list spiders.")

          available = [line.strip() for line in proc.stdout.splitlines() if line.strip()]
          if selected:
              missing = [s for s in selected if s not in available]
              if missing:
                  raise SystemExit(f"Unknown spider(s): {', '.join(missing)}")
              spiders = selected
          else:
              spiders = available

          if not spiders:
              raise SystemExit("No spiders found.")

          matrix = {"spider": spiders}
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
          print(f"Prepared matrix for {len(spiders)} spider(s).")
          PY

  run-spider:
    needs: discover-spiders
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: ${{ github.event.inputs.fail_fast == 'true' }}
      matrix: ${{ fromJson(needs.discover-spiders.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run spider
        env:
          ENABLE_PROXY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.use_proxy || 'true' }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          PROXY_AUTH: ${{ secrets.PROXY_AUTH }}
          PROXY_AUTH_LIST: ${{ secrets.PROXY_AUTH_LIST }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPY_LOG_LEVEL: INFO
          SCRAPY_RETRY_TIMES: "5"
          SCRAPY_DOWNLOAD_TIMEOUT: "45"
        run: |
          python -m scrapy crawl "${{ matrix.spider }}"
